# ===================================
# TEST PROFILE - H2 In-Memory Database
# ===================================
# This profile is activated ONLY during testing via @ActiveProfiles("test")
# All test data lives in H2 memory and is DESTROYED after tests complete
# NO test data will appear in your real MySQL database

spring.application.name=FastX-Test

# H2 In-Memory Database for Testing
# DB_CLOSE_DELAY=-1 keeps H2 alive during the entire test suite
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=false;MODE=MYSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA / Hibernate
# "create-drop" creates tables at start and drops them at end of each test run
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Logging
logging.level.org.hibernate.SQL=DEBUG
